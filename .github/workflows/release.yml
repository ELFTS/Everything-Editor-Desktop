name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
# ==========================================
# 统一构建阶段
# ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --loglevel=info

      - name: Fetch & Compile
        run: |
          npm run fetch
          npm run webpack:prod

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist-astra-extensions/
            dist-extensions/
            dist-library-files/
            dist-renderer-webpack/

# ==========================================
# Linux 打包 (增加了并发限制和文件同步)
# ==========================================
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6 # 限制并发，防止 IO 竞争导致 ASAR 损坏
      matrix:
        format: [debian, tarball, appimage, pacman, rpm]
        arch: [x64, armv7l, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: . # 明确解压到当前目录

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y strip-nondeterminism fakeroot ruby ruby-dev rubygems libarchive-tools rpm
          sudo gem install --no-document fpm

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --ignore-scripts
          sync # 强制同步文件系统，确保 entrypoint.js 对 builder 可见

      - name: Package
        run: |
          node release-automation/build.mjs \
            --${{ matrix.format }} \
            --${{ matrix.arch }} \
            --production

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.format }}-${{ matrix.arch }}
          path: dist/*

# ==========================================
# Snap
# ==========================================
  package-snap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      - name: Install snapcraft
        run: |
          sudo apt-get update
          sudo snap install snapcraft --classic
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install --ignore-scripts && sync
      - name: Package
        run: node release-automation/build.mjs --snap --x64 --production
      - uses: actions/upload-artifact@v4
        with:
          name: linux-snap-x64
          path: dist/*.snap

# ==========================================
# Mac
# ==========================================
  package-mac:
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: modern
            args: '--mac --universal'
          - target: legacy-10.13-10.14
            args: '--mac-legacy-10.13-10.14 --x64'
          - target: legacy-10.15
            args: '--mac-legacy-10.15 --x64'
          - target: legacy-11
            args: '--mac-legacy-11 --universal'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install --ignore-scripts && sync
      - name: Package
        run: node release-automation/build.mjs ${{ matrix.args }} --production
      - uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.target }}
          path: dist/*.dmg

# ==========================================
# Windows
# ==========================================
  package-windows:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: modern-nsis-x64
            args: '--windows --x64'
          - target: modern-nsis-ia32
            args: '--windows --ia32'
          - target: modern-nsis-arm64
            args: '--windows --arm64'
          - target: modern-appx-x64
            args: '--microsoft-store --x64'
          - target: modern-appx-ia32
            args: '--microsoft-store --ia32'
          - target: modern-appx-arm64
            args: '--microsoft-store --arm64'
          - target: portable
            args: '--windows-portable --x64'
          - target: legacy-x64
            args: '--windows-legacy --x64'
          - target: legacy-ia32
            args: '--windows-legacy --ia32'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: repo
      - name: Move and Prepare
        shell: pwsh
        run: |
          Copy-Item -Path repo -Destination D:\repo -Recurse
          Remove-Item -Path repo -Recurse -Force
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: D:\repo\
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        working-directory: D:\repo
        run: npm install --ignore-scripts
      - name: Package
        working-directory: D:\repo
        run: node release-automation/build.mjs ${{ matrix.args }} --production
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: D:\repo\dist\*

# ==========================================
# 发布阶段 (修正了通配符和下载逻辑)
# ==========================================
  publish:
    needs: [package-linux, package-snap, package-mac, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Releases
        shell: bash
        run: |
          shopt -s nullglob
          FILES=$(ls dist/*.{exe,dmg,deb,zip,tar.gz,AppImage,snap,rpm,zst,appx} 2>/dev/null || true)
          
          if [ -z "$FILES" ]; then
            echo "No packages found!"
            exit 1
          fi

          node scripts/upload-to-github-releases.mjs \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            $FILES
        env:
          GH_TOKEN: "${{ github.token }}"