name: flatpak

on:
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # Node 环境
    # -----------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install dependencies
      run: |
        rm -f package-lock.json
        npm install --loglevel=info

    - name: Fetch assets
      run: npm run fetch

    # -----------------------------
    # 安装 Flatpak
    # -----------------------------
    - name: Install Flatpak
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        sudo flatpak remote-add --if-not-exists flathub \
          https://flathub.org/repo/flathub.flatpakrepo

    # -----------------------------
    # 安装 Runtime（显式指定架构）
    # -----------------------------
    - name: Install runtimes (x86_64 / 24.08)
      run: |
        sudo flatpak --system install -y --noninteractive flathub \
          org.freedesktop.Platform/x86_64/24.08 \
          org.freedesktop.Sdk/x86_64/24.08 \
          org.electronjs.Electron2.BaseApp/x86_64/24.08

        echo "===== Installed Flatpak Runtimes ====="
        sudo flatpak --system list

    # -----------------------------
    # 构建 Electron Linux
    # -----------------------------
    - name: Build Linux app
      run: npm run build:linux

    - name: Prepare Flatpak sources
      run: |
        cp dist-linux/linux-unpacked/astraeditor-desktop dist-linux/

    # -----------------------------
    # 构建 Flatpak（system 域）
    # -----------------------------
    - name: Build Flatpak
      run: |
        sudo flatpak-builder \
          --repo=repo \
          build-dir \
          flatpak/org.astraeditor.AstraEditor.yml \
          --force-clean

        sudo flatpak build-bundle \
          repo \
          AstraEditor.flatpak \
          org.astraeditor.AstraEditor

        mkdir -p dist
        mv AstraEditor.flatpak dist/

    # -----------------------------
    # 上传构建产物
    # -----------------------------
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-flatpak-x64
        path: dist/*.flatpak
        retention-days: 1