name: flatpak

on:
  push:
  pull_request:

jobs:
  # ================================
  # Node 构建
  # ================================
  build-node:
    runs-on: ubuntu-latest
    outputs:
      dist-path: ${{ steps.set-dist-path.outputs.dist-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --loglevel=info

      - name: Fetch assets
        run: npm run fetch

      - name: Build Linux app
        run: npm run build:linux

      - name: Prepare Flatpak sources
        id: set-dist-path
        run: |
          cp -r dist-linux/linux-unpacked/astraeditor-desktop dist-linux/
          echo "dist-path=dist-linux" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist-linux/

  # ================================
  # Flatpak 构建
  # ================================
  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist-linux

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

          sudo flatpak remote-add --if-not-exists --system flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          sudo flatpak install -y --noninteractive --system flathub \
            org.freedesktop.Platform/x86_64/24.08 \
            org.freedesktop.Sdk/x86_64/24.08 \
            org.electronjs.Electron2.BaseApp/x86_64/24.08

          echo "========== INSTALLED SYSTEM RUNTIMES =========="
          sudo flatpak list --system

      - name: Build Flatpak
        run: |
          sudo flatpak-builder \
            --repo=repo \
            --force-clean \
            --system \
            build-dir \
            flatpak/org.astraeditor.AstraEditor.yml

          flatpak build-bundle \
            repo \
            AstraEditor.flatpak \
            org.astraeditor.AstraEditor

          mkdir -p dist
          mv AstraEditor.flatpak dist/

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-x64
          path: dist/*.flatpak
          retention-days: 1