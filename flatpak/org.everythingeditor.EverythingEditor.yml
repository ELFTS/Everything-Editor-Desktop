app-id: org.everythingeditor.EverythingEditor
runtime: org.electronjs.Electron2.BaseApp
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: run.sh
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
modules:
  - name: everythingeditor
    buildsystem: simple
    sources:
      - type: dir
        path: ../dist-linux/linux-unpacked
      - type: file
        path: ../run.sh  
    build-commands:
      - mkdir -p /app/bin
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 resources/app.asar /app/app.asar
      - install -Dm644 linux-files/org.everythingeditor.EverythingEditor.desktop /app/share/applications/org.everythingeditor.EverythingEditor.desktop
      - install -Dm644 linux-files/org.everythingeditor.EverythingEditor.metainfo.xml /app/share/metainfo/org.everythingeditor.EverythingEditor.metainfo.xml
      - install -Dm644 linux-files/org.everythingeditor.EverythingEditor.mime.xml /app/share/mime/packages/org.everythingeditor.EverythingEditor.mime.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/org.everythingeditor.EverythingEditor.png
      - mkdir -p /app/share/everythingeditor
